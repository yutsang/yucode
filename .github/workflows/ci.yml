name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test and Build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Lint (ruff)
        run: ruff check coding_agent/ tests/

      - name: Run tests
        run: pytest -q

      - name: Run parity harness
        run: pytest tests/test_parity_harness.py -v

      - name: Run doctor smoke test
        env:
          YUCODE_API_KEY: ci-placeholder-key
        run: |
          mkdir -p "$HOME/.yucode"
          cat <<'EOF' > "$HOME/.yucode/settings.yml"
          provider:
            api_key: ci-placeholder-key
          EOF
          python -m coding_agent.interface.cli init .
          python -m coding_agent.interface.cli doctor --workspace . --output-format json || true

      - name: Build package
        run: python -m build
